<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>QR Llegada - SI-3</title>
    <style>
        body { margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: Arial, sans-serif; background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        h1 { margin-bottom: 10px; font-size: 24px; color: white; }
        p { margin-bottom: 20px; color: rgba(255,255,255,0.8); }
        #qr { width: 250px; height: 250px; background: white; padding: 10px; border-radius: 10px; }
        img, canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <h1>QR Confirmar Llegada</h1>
    <p>Escanee para confirmar</p>
    <div id="qr"></div>
    <p id="msg">Cargando...</p>
    
    <!-- Cargar qrcode.js -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    
    <script>
        // Dar tiempo a que cargue
        window.onload = function() {
            setTimeout(generarQR, 300);
        };
        
        function generarQR() {
            var container = document.getElementById('qr');
            var msg = document.getElementById('msg');
            
            if (typeof QRCode === 'undefined') {
                msg.innerHTML = 'Error: librería no cargó';
                return;
            }
            
            var baseUrl = window.location.href.split('/').slice(0, -1).join('/') + '/';
            var url = baseUrl + 'llegada.html';
            
            msg.innerHTML = 'Generando...';
            
            try {
                var qr = new QRCode(container, {
                    text: url,
                    width: 250,
                    height: 250,
                    colorDark: "#000000",
                    colorLight: "#ffffff"
                });
                
                msg.innerHTML = '✓ Listo';
                msg.style.color = '#90EE90';
            } catch(e) {
                msg.innerHTML = 'Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
